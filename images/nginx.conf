events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  # ===== HTTP (80): ACME + redirect =====
  server {
    listen 80;
    server_name fullstack-developer-adam.wozniewski.click www.fullstack-developer-adam.wozniewski.click;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
      try_files $uri =404;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ===== HTTPS (443): proxy do aplikacji =====
  server {
    listen 443 ssl http2;
    server_name fullstack-developer-adam.wozniewski.click www.fullstack-developer-adam.wozniewski.click;

    ssl_certificate     /etc/letsencrypt/live/fullstack-developer-adam.wozniewski.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fullstack-developer-adam.wozniewski.click/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
      proxy_pass         http://web:3000;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
    }
  }
}