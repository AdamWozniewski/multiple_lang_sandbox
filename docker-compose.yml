  nginx:
    build:
      context: ./docker/nginx

    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot-web:/var/www/certbot
      - ./certs:/etc/letsencrypt:ro
    restart: unless-stopped

  next:
    build:
      context: ./packages/fullstack
      dockerfile: Dockerfile
    env_file: [ .env ]

    restart: unless-stopped

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    env_file: [ .env ]

    restart: unless-stopped
